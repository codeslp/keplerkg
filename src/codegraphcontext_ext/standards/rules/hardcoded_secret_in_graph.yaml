id: hardcoded_secret_in_graph
advisory_kind: hardcoded_secret_in_graph
severity: hard
category: compliance
summary: Source code contains hardcoded credential literals.
evidence: "Graph-backed: Function or Variable node whose source property contains string-literal assignments to sensitive-named variables (password, api_key, secret, token)."
query: |
  MATCH (f:Function)
  WHERE f.source IS NOT NULL
    AND NOT f.is_dependency AND NOT f.path CONTAINS '/tests/'
    AND (f.source =~ '(?i)password\s*=\s*["\x27][^"\x27]+["\x27]'
      OR f.source =~ '(?i)api_key\s*=\s*["\x27][^"\x27]+["\x27]'
      OR f.source =~ '(?i)secret\s*=\s*["\x27][^"\x27]+["\x27]'
      OR f.source =~ '(?i)token\s*=\s*["\x27][^"\x27]+["\x27]')
  RETURN f.uid, f.name, f.path, f.line_number, NULL AS metric
suggestion: "{{name}} contains a hardcoded credential — move to environment variables or a secrets manager (SOC 2 CC6.1)."
